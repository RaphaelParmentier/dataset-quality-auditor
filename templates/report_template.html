<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Data Quality Report</title>

  <style>
    body {
      background-color: #070B14;
      color: #F8FAFC;
      font-family: Arial, sans-serif;
      margin: 40px;
      line-height: 1.6;
    }

    h1, h2 {
      color: #F97316;
    }

    .card {
      background: #0F172A;
      border: 1px solid #1E293B;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 24px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 16px;
    }

    th, td {
      border: 1px solid #334155;
      padding: 10px;
      text-align: left;
    }

    th {
      background-color: #1E293B;
    }

    img {
      margin-top: 20px;
      max-width: 100%;
      border-radius: 12px;
    }

    .metric {
      font-size: 20px;
      font-weight: bold;
      color: #F97316;
    }
  </style>
</head>

<body>

  <h1>AI Data Quality Report</h1>

  <div class="card">
    <h2>Dataset Overview</h2>

    <p><span class="metric">{{ n_rows }}</span> rows</p>
    <p><span class="metric">{{ n_columns }}</span> columns</p>
    <p>Memory usage: {{ memory_usage_mb }} MB</p>
  </div>

  <div class="card">
    <h2>Missing Values</h2>

    {{ missing_values_table }}

    <img src="../outputs/missing_values.png" />
  </div>

  <div class="card">
    <h2>Duplicate Rows</h2>

    <p>Duplicate count: {{ duplicate_count }}</p>
    <p>Duplicate percentage: {{ duplicate_percent }}%</p>
  </div>

</body>
</html>
